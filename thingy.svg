<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="height: 100%; background: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center;">
      
      <style>
        /* Hide the actual checkboxes */
        .logic { display: none; }

        /* Counter Logic */
        .count-display::before { content: "0"; font-size: 48px; color: #58a6ff; font-weight: bold; }
        
        #step1:checked ~ .count-display::before { content: "1"; }
        #step2:checked ~ .count-display::before { content: "2"; }
        #step3:checked ~ .count-display::before { content: "3"; }

        /* Button Styling */
        .btn {
          width: 100px; height: 100px;
          background: #238636;
          border-radius: 50%;
          cursor: pointer;
          margin-top: 20px;
          display: flex;
          align-items: center;
          justify-content: center;
          user-select: none;
        }

        /* Show only the label for the NEXT click */
        .click-label { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; }
        
        #start:not(:checked) ~ .btn label[for="step1"] { display: flex; }
        #step1:checked ~ .btn label[for="step1"] { display: none; }
        #step1:checked ~ .btn label[for="step2"] { display: flex; }
        #step2:checked ~ .btn label[for="step2"] { display: none; }
        #step3:checked ~ .btn label[for="step3"] { display: none; }
        #step2:checked ~ .btn label[for="step3"] { display: flex; }

        .btn:active { transform: scale(0.9); }
      </style>

      <input type="checkbox" id="start" class="logic" />
      <input type="checkbox" id="step1" class="logic" />
      <input type="checkbox" id="step2" class="logic" />
      <input type="checkbox" id="step3" class="logic" />

      <div class="count-display"></div>

      <div class="btn">
        <label for="step1" class="click-label">CLICK</label>
        <label for="step2" class="click-label">CLICK</label>
        <label for="step3" class="click-label">CLICK</label>
      </div>

      <p style="color: #8b949e; font-size: 12px; margin-top: 20px;">SVG Logic Counter (Raw View Compatible)</p>
    </div>
  </foreignObject>
</svg>
