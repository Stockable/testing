# run this on your computer to generate the "forever" file
clicks = 1000
with open("forever_clicker.svg", "w") as f:
    f.write('<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">\n')
    f.write('<foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml" style="height:100%;background:#0d1117;color:white;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;">\n')
    
    # CSS Logic
    f.write('<style>body{counter-reset:s 0;}input{position:absolute;opacity:0;}input:checked{counter-increment:s;}\n')
    f.write('.score::after{content:counter(s);font-size:80px;color:#58a6ff;font-weight:bold;}\n')
    f.write('.container{position:relative;width:150px;height:150px;margin-top:20px;}\n')
    f.write('.btn{position:absolute;width:150px;height:150px;background:#238636;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,0.5);}\n')
    f.write('.btn:active{transform:scale(0.95);background:#2ea043;}\n')
    
    # The "Next" Logic Generator
    f.write('#c1:not(:checked) ~ .container label[for="c1"]{display:flex;}\n')
    for i in range(1, clicks):
        f.write(f'#c{i}:checked + #c{i+1}:not(:checked) ~ .container label[for="c{i+1}"]{{display:flex;}}\n')
    f.write('</style>\n')

    # Generate Inputs
    for i in range(1, clicks + 1):
        f.write(f'<input type="checkbox" id="c{i}"/>')
    
    f.write('<div class="score"></div><div class="container">\n')
    
    # Generate Labels
    for i in range(1, clicks + 1):
        f.write(f'<label for="c{i}" class="btn">CLICK</label>')
        
    f.write('</div><p style="color:#8b949e;margin-top:20px;">1,000 Click Challenge</p></div></foreignObject></svg>')
