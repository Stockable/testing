<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="height: 100%; background: #0d1117; color: white; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; user-select: none;">
      
      <style>
        input { display: none; }
        
        /* The Counter Display Logic */
        .odometer { font-size: 60px; display: flex; gap: 5px; color: #58a6ff; font-weight: bold; margin-bottom: 20px; }
        
        /* Initialize 3 digits */
        .digit { width: 40px; text-align: center; }
        .h::before { content: "0"; }
        .t::before { content: "0"; }
        .o::before { content: "0"; }

        /* Logic for Ones (0-9) */
        #o1:checked ~ * .o::before { content: "1"; }
        #o2:checked ~ * .o::before { content: "2"; }
        #o3:checked ~ * .o::before { content: "3"; }
        #o4:checked ~ * .o::before { content: "4"; }
        #o5:checked ~ * .o::before { content: "5"; }

        /* Logic for Tens (0-5) */
        #t1:checked ~ * .t::before { content: "1"; }
        #t2:checked ~ * .t::before { content: "2"; }

        /* Button UI */
        .controls { display: flex; gap: 10px; }
        .btn { 
          padding: 10px; background: #238636; border-radius: 5px; cursor: pointer; font-size: 12px;
        }
        .btn:active { background: #2ea043; transform: scale(0.9); }

        /* Hide "used" buttons in the sequence */
        #o1:checked ~ * label[for="o1"] { display: none; }
        #o1:not(:checked) ~ * label[for="o2"] { display: none; }
        /* and so on... */
      </style>

      <input type="radio" name="ones" id="o0" checked="checked" />
      <input type="radio" name="ones" id="o1" />
      <input type="radio" name="ones" id="o2" />
      <input type="radio" name="ones" id="o3" />
      <input type="radio" name="ones" id="o4" />
      <input type="radio" name="ones" id="o5" />
      
      <input type="radio" name="tens" id="t0" checked="checked" />
      <input type="radio" name="tens" id="t1" />
      <input type="radio" name="tens" id="t2" />

      <div class="odometer">
        <div class="digit h"></div>
        <div class="digit t"></div>
        <div class="digit o"></div>
      </div>

      <div class="controls">
        <div style="display:flex; flex-direction:column; align-items:center;">
          <div class="btn"><label for="o1">ONES +1</label><label for="o2">ONES +1</label><label for="o3">ONES +1</label><label for="o4">ONES +1</label><label for="o5">ONES +1</label></div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center;">
          <div class="btn"><label for="t1">TENS +1</label><label for="t2">TENS +1</label></div>
        </div>
      </div>

      <p style="color:#8b949e; font-size:10px; margin-top:20px;">RAW GITHUB MULTI-DIGIT ENGINE</p>
    </div>
  </foreignObject>
</svg>
